const SKIP_DATES = new Set([
  "2025-04-02","2025-04-03","2025-04-04","2025-04-05","2025-04-06",
  "2025-05-29",
]);

function isWorkday(d) {
  const dow = d.getDay();
  if (dow === 0 || dow === 6) return false;
  return !SKIP_DATES.has(d.toISOString().slice(0, 10));
}
function addWorkdays(startDate, days) {
  let d = new Date(startDate); let count = 0;
  while (count < days - 1) { d.setDate(d.getDate() + 1); if (isWorkday(d)) count++; }
  return d;
}
function nextWorkday(d) {
  let nd = new Date(d);
  while (!isWorkday(nd)) nd.setDate(nd.getDate() + 1);
  return nd;
}
function dayAfter(d) {
  let nd = new Date(d); nd.setDate(nd.getDate() + 1); return nextWorkday(nd);
}
function fmtDate(d) {
  if (!d) return "";
  const months = ["jan","feb","mar","apr","maj","jun","jul","aug","sep","okt","nov","dec"];
  return `${d.getDate()}. ${months[d.getMonth()]}`;
}
function parseDate(str) {
  if (!str) return null;
  const [y, m, d] = str.split("-").map(Number);
  return new Date(y, m - 1, d);
}
function toInputDate(d) {
  if (!d) return "";
  const yr = d.getFullYear();
  const mo = String(d.getMonth()+1).padStart(2,"0");
  const dy = String(d.getDate()).padStart(2,"0");
  return `${yr}-${mo}-${dy}`;
}

];

const FIXED_STARTS = {
  1: new Date(2025,2,6),
  2: new Date(2025,2,6),
  3: new Date(2025,2,11),
};

function buildInitialChecked() {
  const obj = {};
  PHASE_DEFS.forEach(p => p.steps.forEach((_,i) => { obj[`${p.id}-${i}`] = false; }));
  return obj;
}

function calcSchedule(actualEnds) {
  const schedule = {};
  schedule[1] = { start: FIXED_STARTS[1], end: FIXED_STARTS[1] };
  let cursor = FIXED_STARTS[2];
  for (let i = 1; i < PHASE_DEFS.length; i++) {
    const p = PHASE_DEFS[i];
    if (!p.workdays) continue;
    const fixedStart = FIXED_STARTS[p.id];
    const start = fixedStart ? nextWorkday(fixedStart) : nextWorkday(cursor);
    if (actualEnds[p.id]) {
      const actualEnd = parseDate(actualEnds[p.id]);
      schedule[p.id] = { start, end: actualEnd, isActual: true };
      cursor = dayAfter(actualEnd);
    } else {
      const end = addWorkdays(start, p.workdays);
      schedule[p.id] = { start, end, isActual: false };
      cursor = dayAfter(end);
    }
  }
  return schedule;
}

// Firebase save (debounced to avoid hammering on every click)
let saveTimer = null;
function saveToFirebase(data) {
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    db.ref("tilbygning").set(data).catch(console.error);
  }, 600);
}

function App() {
  const [checked, setChecked] = useState(buildInitialChecked);
  const [collapsed, setCollapsed] = useState({});
  const [actualEnds, setActualEnds] = useState({});
  const [syncStatus, setSyncStatus] = useState("loading"); // loading | ok | error

  const schedule = useMemo(() => calcSchedule(actualEnds), [actualEnds]);

  // Load from Firebase on mount + listen for real-time updates
  useEffect(() => {
    const ref = db.ref("tilbygning");
    ref.on("value", snap => {
      const data = snap.val();
      if (data) {
        if (data.checked) setChecked(prev => ({ ...buildInitialChecked(), ...data.checked }));
        if (data.collapsed) setCollapsed(data.collapsed);
        if (data.actualEnds) setActualEnds(data.actualEnds);
      }
      setSyncStatus("ok");
    }, () => setSyncStatus("error"));
    return () => ref.off();
  }, []);

  function persist(c, col, ae) {
    saveToFirebase({ checked: c, collapsed: col, actualEnds: ae });
  }

  function isAllDone(phaseId) {
    const p = PHASE_DEFS.find(x => x.id === phaseId);
    return p.steps.every((_,i) => checked[`${phaseId}-${i}`]);
  }

  function toggleStep(phaseId, stepIdx) {
    const key = `${phaseId}-${stepIdx}`;
    const newChecked = { ...checked, [key]: !checked[key] };
    const p = PHASE_DEFS.find(x => x.id === phaseId);
    const allNowDone = p.steps.every((_,i) => newChecked[`${phaseId}-${i}`]);
    let newCollapsed = { ...collapsed };
    let newAE = { ...actualEnds };

    if (allNowDone) {
      if (!newAE[phaseId]) newAE[phaseId] = toInputDate(new Date());
      setTimeout(() => {
        setCollapsed(c => { const nc = { ...c, [phaseId]: true }; persist(newChecked, nc, newAE); return nc; });
      }, 450);
    } else {
      newCollapsed[phaseId] = false;
      setCollapsed(newCollapsed);
    }
    setChecked(newChecked);
    setActualEnds(newAE);
    persist(newChecked, newCollapsed, newAE);
  }

  function toggleCollapse(phaseId) {
    const newCollapsed = { ...collapsed, [phaseId]: !collapsed[phaseId] };
    setCollapsed(newCollapsed);
    persist(checked, newCollapsed, actualEnds);
  }

  function handleActualEndChange(phaseId, val) {
    const newAE = { ...actualEnds, [phaseId]: val };
    setActualEnds(newAE);
    persist(checked, collapsed, newAE);
  }

  function clearActualEnd(phaseId) {
    const newAE = { ...actualEnds };
    delete newAE[phaseId];
    setActualEnds(newAE);
    persist(checked, collapsed, newAE);
  }

  const totalSteps = PHASE_DEFS.reduce((s,p) => s + p.steps.length, 0);
  const doneSteps = Object.values(checked).filter(Boolean).length;
  const pct = totalSteps ? Math.round(doneSteps / totalSteps * 100) : 0;
  const finalEnd = schedule[13]?.end;

  return (
    <div style={{ fontFamily:"'DM Sans',sans-serif", background:"#FBF7F1", minHeight:"100vh" }}>

      {/* HEADER */}
      <div style={{ background:"#1E1A16", padding:"48px 32px 44px", position:"relative", overflow:"hidden" }}>
        <div style={{ position:"absolute", top:-60, right:-60, width:280, height:280, borderRadius:"50%", border:"1px solid rgba(196,146,90,0.25)", pointerEvents:"none" }}/>
        <div style={{ position:"absolute", bottom:-40, left:"30%", width:160, height:160, borderRadius:"50%", border:"1px solid rgba(196,146,90,0.12)", pointerEvents:"none" }}/>
        <div style={{ fontSize:10, letterSpacing:4, textTransform:"uppercase", color:"#C4925A", marginBottom:14 }}>Trin-for-trin guide</div>
        <h1 style={{ fontFamily:"'Playfair Display',serif", fontSize:"clamp(28px,5vw,52px)", fontWeight:900, color:"#F5EFE4", lineHeight:1.05 }}>
          Fra <span style={{ color:"#C4925A" }}>udgravning</span> til<br/>færdigt rum
        </h1>
        <p style={{ marginTop:14, fontSize:13, color:"rgba(245,239,228,0.45)", lineHeight:1.75, maxWidth:460, fontWeight:300 }}>
          Opstart: <strong style={{ color:"#C4925A" }}>11. marts 2025</strong> · Forventet afslutning: <strong style={{ color:"#C4925A" }}>{finalEnd ? fmtDate(finalEnd) : "–"}</strong><br/>
          Datoer opdateres automatisk hvis en fase afsluttes til en anden tid end planlagt.
        </p>
        <div style={{ marginTop:28, maxWidth:480, position:"relative", zIndex:1 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:10 }}>
            <span style={{ fontSize:10, letterSpacing:3, textTransform:"uppercase", color:"rgba(245,239,228,0.35)" }}>Samlet fremskridt</span>
            <span style={{ fontFamily:"'Playfair Display',serif", fontSize:24, fontWeight:700, color:"#C4925A" }}>{pct}%</span>
          </div>
          <div style={{ height:4, background:"rgba(255,255,255,0.08)", borderRadius:2, overflow:"hidden" }}>
            <div style={{ height:"100%", width:`${pct}%`, background:"linear-gradient(90deg,#C4925A,#e8b06a)", borderRadius:2, transition:"width 0.5s ease" }}/>
          </div>
          <div style={{ fontSize:11, color:"rgba(245,239,228,0.28)", marginTop:7 }}>
            {doneSteps} af {totalSteps} punkter afkrydset
            {syncStatus === "loading" && <span style={{ color:"rgba(196,146,90,0.6)", marginLeft:8 }}>· Henter data…</span>}
            {syncStatus === "ok" && <span style={{ color:"rgba(74,140,92,0.7)", marginLeft:8 }}>· Synkroniseret ✓</span>}
            {syncStatus === "error" && <span style={{ color:"#e07060", marginLeft:8 }}>· Kunne ikke forbinde til sky</span>}
          </div>
        </div>
      </div>

      {/* TIMELINE */}
      <div style={{ maxWidth:860, margin:"0 auto", padding:"44px 20px 80px" }}>
        <div style={{ position:"relative" }}>
          <div style={{ position:"absolute", left:34, top:0, bottom:0, width:2, background:"linear-gradient(to bottom,#C4925A,#E8D9C2,transparent)", pointerEvents:"none" }}/>

          {PHASE_DEFS.map((phase, phaseIdx) => {
            const done = isAllDone(phase.id);
            const isCollapsed = !!collapsed[phase.id];
            const sched = schedule[phase.id];
            const hasActualEnd = !!actualEnds[phase.id];

            let dateLabel = phase.staticDate || "";
            if (!phase.staticDate && sched) {
              dateLabel = fmtDate(sched.start) === fmtDate(sched.end)
                ? fmtDate(sched.start)
                : `${fmtDate(sched.start)}–${fmtDate(sched.end)}`;
            }

            return (
              <div key={phase.id}>
                {phase.dividerBefore && (
                  <div style={{ textAlign:"center", padding:"24px 0 8px", marginBottom:8, position:"relative" }}>
                    <div style={{ height:1, background:"#E8D9C2", marginBottom:-10 }}/>
                    <span style={{ fontSize:10, letterSpacing:5, textTransform:"uppercase", color:"#C4925A", background:"#FBF7F1", padding:"0 18px", position:"relative" }}>{phase.dividerBefore}</span>
                  </div>
                )}

                <div style={{ display:"flex", gap:24, marginBottom:6 }}>
                  {/* Circle */}
                  <div style={{ display:"flex", flexDirection:"column", alignItems:"center", flexShrink:0, width:70 }}>
                    <div style={{
                      width:40, height:40, borderRadius:"50%", flexShrink:0, zIndex:1, position:"relative",
                      display:"flex", alignItems:"center", justifyContent:"center",
                      fontFamily:"'Playfair Display',serif", fontSize: done ? 18 : 14, fontWeight:700,
                      background: done ? "#4A8C5C" : phase.highlight ? "#C4925A" : "#1E1A16",
                      border:`2px solid ${done ? "#4A8C5C" : "#C4925A"}`,
                      color:(done || phase.highlight) ? "white" : "#C4925A",
                      transition:"all 0.3s",
                    }}>{done ? "✓" : phase.id}</div>
                    {phaseIdx < PHASE_DEFS.length - 1 && (
                      <div style={{ width:2, flex:1, minHeight:16, background: done ? "rgba(74,140,92,0.35)" : "#E8D9C2", margin:"4px 0", transition:"background 0.3s" }}/>
                    )}
                  </div>

                  {/* Card */}
                  <div style={{
                    flex:1, background: done ? "rgba(74,140,92,0.07)" : "white",
                    border:`1px solid ${done ? "rgba(74,140,92,0.3)" : "#E8D9C2"}`,
                    borderRadius:12, padding: isCollapsed ? "16px 22px" : "20px 24px",
                    marginBottom:10, transition:"all 0.25s",
                  }}>
                    {/* Header */}
                    <div onClick={() => toggleCollapse(phase.id)} style={{ display:"flex", alignItems:"center", gap:10, cursor:"pointer", userSelect:"none", marginBottom: isCollapsed ? 0 : 12, flexWrap:"wrap" }}>
                      <span style={{ fontSize:19 }}>{phase.icon}</span>
                      <span style={{ fontFamily:"'Playfair Display',serif", fontSize:17, fontWeight:700, color: done ? "#4A8C5C" : "#1E1A16", transition:"color 0.3s" }}>{phase.title}</span>
                      {done && <span style={{ fontSize:11, color:"#4A8C5C", background:"rgba(74,140,92,0.12)", padding:"2px 9px", borderRadius:20 }}>✓ Færdig</span>}
                      <div style={{ marginLeft:"auto", display:"flex", alignItems:"center", gap:6 }}>
                        {dateLabel && (
                          <span style={{
                            fontSize:11, color: hasActualEnd ? "#4A8C5C" : "#C4925A",
                            background: hasActualEnd ? "rgba(74,140,92,0.1)" : "rgba(196,146,90,0.1)",
                            padding:"3px 10px", borderRadius:20, whiteSpace:"nowrap", display:"flex", alignItems:"center", gap:4,
                          }}>
                            {hasActualEnd && "📅 "}{dateLabel}
                          </span>
                        )}
                        <span style={{ fontSize:11, color:"#C4925A", display:"inline-block", transition:"transform 0.3s", transform: isCollapsed ? "rotate(-90deg)" : "rotate(0deg)" }}>▼</span>
                      </div>
                    </div>

                    {/* Body with smooth collapse */}
                    <div style={{ overflow:"hidden", maxHeight: isCollapsed ? 0 : 1400, opacity: isCollapsed ? 0 : 1, transition:"max-height 0.4s ease, opacity 0.3s ease" }}>
                      <p style={{ fontSize:13, lineHeight:1.75, color:"#4A3F35", marginBottom:12, fontWeight:300 }}>
                        {phase.desc}{phase.note && <em style={{ color:"#C4925A" }}> {phase.note}</em>}
                      </p>

                      {/* Steps */}
                      <div style={{ display:"flex", flexDirection:"column", gap:2 }}>
                        {phase.steps.map((step, i) => {
                          const isChecked = checked[`${phase.id}-${i}`];
                          return (
                            <div key={i} onClick={() => toggleStep(phase.id, i)}
                              style={{ display:"flex", gap:10, alignItems:"flex-start", padding:"5px 7px", borderRadius:7, cursor:"pointer" }}
                              onMouseEnter={e => e.currentTarget.style.background="rgba(196,146,90,0.07)"}
                              onMouseLeave={e => e.currentTarget.style.background="transparent"}
                            >
                              <div style={{
                                width:18, height:18, borderRadius:4, flexShrink:0, marginTop:2,
                                display:"flex", alignItems:"center", justifyContent:"center",
                                border:`1.5px solid ${isChecked ? "#4A8C5C" : "#C4925A"}`,
                                background: isChecked ? "#4A8C5C" : "white", transition:"all 0.2s",
                              }}>
                                {isChecked && (
                                  <svg width="10" height="10" viewBox="0 0 12 10" fill="none" stroke="white" strokeWidth="2.5">
                                    <polyline points="1,5 4.5,8.5 11,1"/>
                                  </svg>
                                )}
                              </div>
                              <span style={{ fontSize:13, color: isChecked ? "#b0a89e" : "#4A3F35", textDecoration: isChecked ? "line-through" : "none", lineHeight:1.55, fontWeight:300 }}>{step}</span>
                            </div>
                          );
                        })}
                      </div>

                      {/* Actual end date – shown when phase done */}
                      {done && phase.workdays && (
                        <div style={{ marginTop:14, padding:"12px 14px", background:"rgba(74,140,92,0.07)", borderRadius:8, border:"1px solid rgba(74,140,92,0.2)" }}>
                          <div style={{ fontSize:12, color:"#4A8C5C", marginBottom:8, fontWeight:500 }}>📅 Faktisk slutdato — opdaterer efterfølgende faser</div>
                          <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap" }}>
                            <input type="date" value={actualEnds[phase.id] || ""} onChange={e => handleActualEndChange(phase.id, e.target.value)}
                              style={{ border:"1px solid rgba(74,140,92,0.4)", borderRadius:6, padding:"6px 10px", fontSize:13, color:"#1E1A16", background:"white", outline:"none", cursor:"pointer" }}/>
                            {hasActualEnd
                              ? <button onClick={() => clearActualEnd(phase.id)} style={{ fontSize:12, color:"#999", background:"none", border:"none", cursor:"pointer", padding:"4px 8px" }}>✕ Nulstil</button>
                              : <span style={{ fontSize:12, color:"#aaa" }}>Bruger beregnet dato</span>
                            }
                          </div>
                        </div>
                      )}

                      {/* Tip */}
                      {phase.tip && (
                        <div style={{ background:"rgba(196,146,90,0.08)", borderLeft:"3px solid #C4925A", borderRadius:"0 8px 8px 0", padding:"10px 14px", marginTop:12, fontSize:13, color:"#8B4A2F", lineHeight:1.6, fontWeight:300 }}>
                          <strong style={{ fontWeight:500 }}>{phase.tipLabel}</strong> {phase.tip}
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      <div style={{ background:"#1E1A16", padding:"26px 32px", textAlign:"center", fontSize:12, color:"rgba(245,239,228,0.3)", fontWeight:300 }}>
        Tilbygning 39 m² · Opstart 11. marts 2025 · Afkrydsninger synkroniseres på tværs af alle enheder via Firebase
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
